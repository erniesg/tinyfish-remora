name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  lint-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  playwright:
    runs-on: ubuntu-latest
    needs: lint-build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Detect Playwright dependency
        id: playwright
        run: |
          npm ls @playwright/test --depth=0 >/dev/null 2>&1 \
            && echo "installed=true" >> "$GITHUB_OUTPUT" \
            || echo "installed=false" >> "$GITHUB_OUTPUT"

      - name: Install Playwright browsers
        if: steps.playwright.outputs.installed == 'true'
        run: npx playwright install --with-deps

      - name: Run Playwright tests
        if: steps.playwright.outputs.installed == 'true'
        run: npx playwright test
